{% extends "layout.html" %}

{% block title %}Test{% endblock %}

{% block content %}

<div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-message" class="loading-text">Generating next question...</div>
</div>


<div class="container">
    <h1 style="margin-bottom: 40px;">TEST MODE</h1>

    <div class="options">
        
        <div class="selection-container">
            <label>Complete Curriculum</label>
            <button class="mode-btn full-test-btn" onclick="triggerLoading('Generating Test...', '/test/start/test/all')">
                Start Full Length Test 
            </button>
        </div>

        <div class="selection-container">
            <label> Unit Test </label>
            <select class="drop-down" id="unit-select">
                {% for unit in units_data.units %}
                <option class="drop-down" value="{{ unit.id }}">Unit {{ unit.unit }}: {{ unit.title }}</option>
                {% endfor %}
            </select>
            <button class="mode-btn" onclick="triggerLoading('Generating Test...', '/test/start/test/' + document.getElementById('unit-select').value)">Start Unit Test</button>
        </div>

        <div class="selection-container">
            <label> Subunit Test </label>
            <select class="drop-down" id="subunit-select">
                {% for unit in units_data.units %}
                <optgroup label="Unit {{ unit.unit }}">
                    {% for section in unit.sections %}
                    <option value="{{ section.id }}">{{ section.section }}</option>
                    {% endfor %}
                </optgroup>
                {% endfor %}
            </select>
            <button class="mode-btn" onclick="triggerLoading('Generating Test...', '/test/start/test/' + document.getElementById('subunit-select').value)">Start Subunit Test</button>
        </div>

    </div>
</div>
{% endblock %}
<script>
    function startUnit() {
        const unitId = document.getElementById('unit-select').value;
        window.location.href = "/test/start/unit/" + unitId;
    }
    
    function startSubunit() {
        const sectionId = document.getElementById('subunit-select').value;
        window.location.href = "/test/start/subunit/" + sectionId;
    }
</script>

<script src="{{ url_for('static', filename='page1.js') }}"></script>
</body>
</html>
